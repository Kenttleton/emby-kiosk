name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it below. The more context you give, the easier it is to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or frustration that prompted this request.
      placeholder: I often find myself wanting to... but currently I have to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: What would you like to see? How should it work?
      placeholder: It would be great if...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches or workarounds you've tried or thought about.
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform this applies to
      multiple: true
      options:
        - Android
        - iOS
        - Both
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Mockups, screenshots, links to similar features in other apps, or any other context.
    validations:
      required: false
