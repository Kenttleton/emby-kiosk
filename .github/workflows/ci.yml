name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── Android build ───────────────────────────────────────────────────────────
  android:
    name: Android compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --non-interactive

      - name: Compile check (no APK)
        run: cd android && ./gradlew compileDebugKotlin

  # ── iOS build ───────────────────────────────────────────────────────────────
  ios:
    name: iOS debug build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (iOS)
        env:
          CI: '1'
        run: npx expo prebuild --platform ios

      - name: Pod install
        run: cd ios && pod install

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -workspace ios/EmbyKiosk.xcworkspace \
            -scheme EmbyKiosk \
            -configuration Debug \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="kenttleton" \
            build
